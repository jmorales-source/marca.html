<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Asistencia</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1d2671,#c33764);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
width:360px;
}

h1{
color:white;
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1d2671;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0f1342;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.logo{
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Sistema de Asistencia
</div>

<div class="card">

<input id="user" placeholder="Usuario">

<input id="pin" type="password" placeholder="PIN">

<select id="type">
<option value="Entrada">Entrada</option>
<option value="Salida">Salida</option>
</select>

<input id="note" placeholder="Nota (opcional)">

<button onclick="registrar()">Registrar</button>

<div id="status"></div>

</div>

</div>

<script>

const WEBAPP_URL="https://script.google.com/macros/s/AKfycbxB5iIZBaN_XmhMOHgKHHG1MPex89aCylflKHLS9i7LF8bR2pnbLEoi9XzQo3mWZUXy/exec";

let userIP="Desconocida";

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>userIP=data.ip)
.catch(()=>{});

function registrar(){

const user=document.getElementById("user").value.trim();
const pin=document.getElementById("pin").value.trim();
const type=document.getElementById("type").value;
const note=document.getElementById("note").value;

if(!user||!pin){

alert("Ingrese usuario y PIN");
return;

}

const now=new Date();

const data={

action:"registro",
user:user,
pin:pin,
type:type,
note:note,
ip:userIP,
fecha:now.toLocaleDateString(),
hora:now.toLocaleTimeString()

};

fetch(WEBAPP_URL,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(res=>{

if(res.success){

document.getElementById("status").innerHTML="✅ Registro guardado";

document.getElementById("pin").value="";
document.getElementById("note").value="";

}else{

document.getElementById("status").innerHTML="❌ "+res.message;

}

})
.catch(()=>{

document.getElementById("status").innerHTML="❌ Error de conexión";

});

}

</script>

</body>
</html>
