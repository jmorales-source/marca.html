<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Asistencia</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1d2671,#c33764);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
width:360px;
}

.logo{
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
margin-bottom:15px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1d2671;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0f1342;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Sistema de Asistencia
</div>

<div class="card">

<input id="user" placeholder="Usuario">

<input id="pin" type="password" placeholder="PIN">

<select id="type">
<option value="Entrada">Entrada</option>
<option value="Salida">Salida</option>
</select>

<input id="note" placeholder="Nota (opcional)">

<button onclick="registrar()">Registrar</button>

<div id="status"></div>

</div>

</div>


<form id="hiddenForm"
class="hidden"
action="https://script.google.com/macros/s/AKfycbwqiOMzulDR_N0gBTeyvM8kzq3HpK7OdqCNRzACwdv_Bpx_NvA5s8FVLmUKmSZs4eIG/exec"
method="POST"
target="hiddenFrame">

<input name="user">
<input name="pin">
<input name="type">
<input name="note">
<input name="ip">
<input name="fecha">
<input name="hora">

</form>

<iframe name="hiddenFrame" class="hidden"></iframe>

<script>

let userIP="Desconocida";

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>userIP=d.ip);

function registrar(){

const user=document.getElementById("user").value.trim();
const pin=document.getElementById("pin").value.trim();
const type=document.getElementById("type").value;
const note=document.getElementById("note").value;

if(!user||!pin){

alert("Ingrese usuario y PIN");
return;

}

const now=new Date();

const form=document.getElementById("hiddenForm");

form.user.value=user;
form.pin.value=pin;
form.type.value=type;
form.note.value=note;
form.ip.value=userIP;
form.fecha.value=now.toLocaleDateString();
form.hora.value=now.toLocaleTimeString();

form.submit();

document.getElementById("status").innerHTML="✅ Registro guardado";

setTimeout(()=>{

document.getElementById("pin").value="";
document.getElementById("note").value="";

},500);

}

</script>

</body>
</html>
