<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Asistencia</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1d2671,#c33764);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
width:360px;
}

.logo{
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
margin-bottom:15px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1d2671;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0f1342;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Sistema de Asistencia
</div>

<div class="card">

<input id="user" placeholder="Usuario">

<input id="pin" type="password" placeholder="PIN">

<select id="type">
<option value="Entrada">Entrada</option>
<option value="Salida">Salida</option>
</select>

<input id="note" placeholder="Nota (opcional)">

<button onclick="registrar()">Registrar</button>

<div id="status"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzx-7rN-hrFYZnrnSC5WI7NlEgC45mKwEVGdQkgtilyezV_8Bp--bf5OIwCK8gFKk8u/exec";

let userIP="Desconocida";

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>userIP=d.ip);

function registrar(){

const user=document.getElementById("user").value.trim();
const pin=document.getElementById("pin").value.trim();
const type=document.getElementById("type").value;
const note=document.getElementById("note").value;

if(!user||!pin){

alert("Ingrese usuario y PIN");
return;

}

const now=new Date();

const data=new URLSearchParams();

data.append("user",user);
data.append("pin",pin);
data.append("type",type);
data.append("note",note);
data.append("ip",userIP);
data.append("fecha",now.toLocaleDateString());
data.append("hora",now.toTimeString().substring(0,5));

fetch(API,{
method:"POST",
body:data
})
.then(r=>r.text())
.then(res=>{

if(res=="OK"){

document.getElementById("status").innerHTML="✅ Registro guardado";

document.getElementById("pin").value="";
document.getElementById("note").value="";

}

else if(res=="PIN"){

document.getElementById("status").innerHTML="❌ PIN incorrecto";

}

else if(res=="USER"){

document.getElementById("status").innerHTML="❌ Usuario no existe";

}

else{

document.getElementById("status").innerHTML="⚠ Error de conexión";

}

});

}

</script>

</body>
</html>
